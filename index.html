<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>単位変換ストップウォッチ</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 24px;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 30px;
            color: #e0e0e0;
        }

        /* 1秒の価値の入力エリア */
        .config-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
            background: #1c1c1e;
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid #2c2c2e;
        }

        .config-container label {
            font-size: 14px;
            color: #aeaeb2;
        }

        .config-container input {
            background: #2c2c2e;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 16px;
            width: 80px;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
        }

        .config-container input:focus {
            outline: 2px solid #0a84ff;
        }

        /* タイマー表示：等幅フォントとプロパティでブレを完全に防止 */
        .timer-display {
            font-size: 80px;
            font-weight: 300;
            font-family: 'Courier New', Courier, monospace;
            font-variant-numeric: tabular-nums; 
            margin-bottom: 50px;
            text-align: center;
            letter-spacing: 2px;
        }

        /* ボタンエリア */
        .btn-container {
            display: flex;
            gap: 15px;
            width: 90%;
            max-width: 400px;
        }

        button {
            flex: 1;
            padding: 15px 0;
            font-size: 18px;
            font-weight: 500;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s, opacity 0.1s;
        }

        .start-btn { background: #34c759; color: white; }
        .stop-btn { background: #ff3b30; color: white; }
        .reset-btn { background: #8e8e93; color: white; }

        button:active { opacity: 0.7; }
    </style>
</head>
<body>

    <h1>単位変換ストップウォッチ</h1>

    <div class="config-container">
        <label for="time-value">1秒の価値:</label>
        <input type="number" id="time-value" value="1.00" step="0.01" min="0.01">
    </div>

    <div class="timer-display" id="display">00:00:00.00</div>

    <div class="btn-container">
        <button class="start-btn" onclick="startTimer()">スタート</button>
        <button class="stop-btn" onclick="stopTimer()">ストップ</button>
        <button class="reset-btn" onclick="resetTimer()">リセット</button>
    </div>

    <script>
        let startTime;
        let elapsedTime = 0;
        let timerInterval;

        function updateTime() {
            const now = Date.now();
            const timePassed = now - startTime + elapsedTime;

            // 入力された「1秒の価値（倍率）」を取得（デフォルトは1.00）
            const rateInput = document.getElementById('time-value').value;
            const rate = parseFloat(rateInput) || 1.00;

            // 実際の経過時間に倍率をかけ算して「変換後のミリ秒」を計算
            const convertedTime = timePassed * rate;

            // 時間・分・秒・ミリ秒の計算
            const totalSeconds = Math.floor(convertedTime / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            
            // 小数点第二位（10ミリ秒単位）の計算
            const centiseconds = Math.floor((convertedTime % 1000) / 10);

            // 常に2桁で表示されるように文字を整える
            const hDisplay = String(hours).padStart(2, '0');
            const mDisplay = String(minutes).padStart(2, '0');
            const sDisplay = String(seconds).padStart(2, '0');
            const cDisplay = String(centiseconds).padStart(2, '0');

            document.getElementById('display').textContent = `${hDisplay}:${mDisplay}:${sDisplay}.${cDisplay}`;
        }

        function startTimer() {
            if (!timerInterval) {
                startTime = Date.now();
                timerInterval = setInterval(updateTime, 10); // 10ミリ秒ごとに更新
            }
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                elapsedTime += Date.now() - startTime;
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            elapsedTime = 0;
            document.getElementById('display').textContent = "00:00:00.00";
        }
    </script>
</body>
</html>
