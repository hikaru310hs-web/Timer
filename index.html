<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>単位変換ストップウォッチ</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
            position: relative; /* 右上ボタンの基準線 */
        }

        h1 {
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 20px;
            color: #e0e0e0;
        }

        /* --- ❓ 右上のヘルプボタン --- */
        .help-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 36px;
            height: 36px;
            background: #1c1c1e;
            border: 1px solid #2c2c2e;
            color: #0a84ff;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 100;
            transition: background 0.2s;
        }
        .help-btn:active {
            background: #2c2c2e;
        }

        /* --- 📦 ポップアップ（説明画面）のスタイル --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75); /* 背景を暗く */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: #1c1c1e;
            border: 1px solid #2c2c2e;
            padding: 25px;
            border-radius: 16px;
            width: 85%;
            max-width: 340px;
            text-align: left;
            box-sizing: border-box;
        }
        .modal-text {
            font-size: 15px;
            line-height: 1.6;
            color: #e5e5ea;
            margin-bottom: 20px;
            white-space: pre-wrap; /* 改行を有効に */
        }
        .modal-close-btn {
            width: 100%;
            padding: 12px 0;
            background: #0a84ff;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- 倍率入力エリア --- */
        .config-wrapper {
            background: #1c1c1e;
            padding: 20px 30px;
            border-radius: 16px;
            border: 1px solid #2c2c2e;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 85%;
            max-width: 360px;
            box-sizing: border-box;
        }

        .config-title {
            font-size: 14px;
            color: #aeaeb2;
            margin-bottom: -10px;
        }

        .box-input-container {
            position: relative;
            display: flex;
            align-items: flex-end;
            gap: 5px;
        }

        .digit-box {
            width: 50px;
            height: 60px;
            background: #2c2c2e;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            color: #0a84ff;
            border: 2px solid transparent;
        }

        .dot {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            padding-bottom: 5px;
        }

        #hidden-rate {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            z-index: 10;
        }

        #hidden-rate:focus + .boxes-visual .digit-box {
            border-color: #0a84ff;
        }

        .slider-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px; width: 24px;
            border-radius: 50%;
            background: #0a84ff;
            cursor: pointer;
            margin-top: -10px;
        }

        input[type="range"]::-webkit-slider-run runnable-track {
            width: 100%; height: 6px;
            cursor: pointer;
            background: #48484a;
            border-radius: 3px;
        }

        /* --- タイマー表示エリア --- */
        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
            width: 100%;
            text-align: center;
        }

        .normal-timer {
            font-size: 24px;
            color: #aeaeb2;
            font-family: 'Courier New', Courier, monospace;
            font-variant-numeric: tabular-nums;
            margin-bottom: 5px;
        }

        .converted-timer {
            font-size: 76px;
            font-weight: 300;
            font-family: 'Courier New', Courier, monospace;
            font-variant-numeric: tabular-nums; 
            letter-spacing: 1px;
            color: #fff;
            white-space: nowrap;
        }

        /* --- ラップタイム表示エリア --- */
        .lap-container {
            width: 90%;
            max-width: 400px;
            height: 160px;
            overflow-y: auto;
            margin-bottom: 25px;
            border-top: 1px solid #2c2c2e;
        }

        .lap-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }

        .lap-table th {
            color: #aeaeb2;
            font-size: 12px;
            font-weight: normal;
            padding: 8px 5px;
            text-align: left;
            position: sticky;
            top: 0;
            background: #000;
        }
        .lap-table th:nth-child(2), .lap-table td:nth-child(2) { text-align: center; }
        .lap-table th:nth-child(3), .lap-table td:nth-child(3) { text-align: right; }

        .lap-table td {
            padding: 10px 5px;
            border-bottom: 1px solid #1c1c1e;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            font-variant-numeric: tabular-nums;
        }

        /* --- ボタンエリア --- */
        .btn-container {
            display: flex;
            gap: 15px;
            width: 90%;
            max-width: 400px;
        }

        button {
            flex: 1;
            padding: 15px 0;
            font-size: 18px;
            font-weight: 500;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.1s, opacity 0.1s;
        }

        .start-btn { background: #34c759; color: white; }
        .stop-btn { background: #ff3b30; color: white; }
        .reset-btn { background: #3a3a3c; color: #fff; }
        .lap-btn { background: #2c2c2e; color: #0a84ff; }
        button:active { opacity: 0.7; }

        /* --- スマホ用の自動調整 --- */
        @media (max-width: 440px) {
            h1 { font-size: 18px; margin-bottom: 15px; }
            .config-wrapper { padding: 15px 15px; margin-bottom: 20px; gap: 15px; }
            .digit-box { width: 42px; height: 52px; font-size: 26px; }
            .dot { font-size: 26px; }
            .normal-timer { font-size: 18px; }
            .converted-timer { font-size: 46px; letter-spacing: 0px; }
            .timer-container { margin-bottom: 15px; }
            .lap-container { height: 120px; margin-bottom: 20px; }
            .lap-table { font-size: 14px; }
            button { padding: 12px 0; font-size: 16px; }
            .help-btn { top: 15px; right: 15px; width: 32px; height: 32px; font-size: 18px; }
        }
    </style>
</head>
<body>

    <div class="help-btn" onclick="openModal()">？</div>

    <div class="modal-overlay" id="help-modal" onclick="closeModalOutside(event)">
        <div class="modal-content">
            <div class="modal-text">1秒の単位を変えることで、水泳や陸上などのタイムを競う競技の練習において、自分の限界を錯覚させ、精神面からパフォーマンスを向上させることができると考え制作しました。</div>
            <button class="modal-close-btn" onclick="closeModal()">閉じる</button>
        </div>
    </div>

    <h1>単位変換ストップウォッチ</h1>

    <div class="config-wrapper">
        <div class="config-title">1秒の価値（倍率）</div>
        
        <div class="box-input-container">
            <input type="tel" id="hidden-rate" inputmode="numeric" value="100">
            <div class="boxes-visual" style="display: flex; gap: 5px; align-items: flex-end; pointer-events: none;">
                <div class="digit-box" id="box-ones">1</div>
                <div class="dot">.</div>
                <div class="digit-box" id="box-tenths">0</div>
                <div class="digit-box" id="box-hundredths">0</div>
            </div>
        </div>

        <div class="slider-container">
            <span style="color: #aeaeb2; font-size: 12px;">0.00</span>
            <input type="range" id="rate-slider" min="0" max="999" value="100">
            <span style="color: #aeaeb2; font-size: 12px;">9.99</span>
        </div>
    </div>

    <div class="timer-container">
        <div class="normal-timer">通常: <span id="normal-display">00:00:00.00</span></div>
        <div class="converted-timer" id="display">00:00:00.00</div>
    </div>

    <div class="lap-container" id="lap-container" style="visibility: hidden;">
        <table class="lap-table">
            <thead>
                <tr>
                    <th style="width: 30%;">ラップ数</th>
                    <th style="width: 35%;">スプリット</th>
                    <th style="width: 35%;">合計タイム</th>
                </tr>
            </thead>
            <tbody id="lap-list">
            </tbody>
        </table>
    </div>

    <div class="btn-container">
        <button class="start-btn" onclick="startTimer()">スタート</button>
        <button class="stop-btn" onclick="stopTimer()">ストップ</button>
        <button class="reset-btn" id="sub-btn" onclick="resetTimer()">リセット</button>
    </div>

    <script>
        // --- ポップアップ制御ロジック ---
        function openModal() {
            document.getElementById('help-modal').classList.add('active');
        }
        function closeModal() {
            document.getElementById('help-modal').classList.remove('active');
        }
        function closeModalOutside(e) {
            if (e.target.id === 'help-modal') {
                closeModal();
            }
        }

        // --- 倍率入力の連動ロジック ---
        const hiddenRate = document.getElementById('hidden-rate');
        const slider = document.getElementById('rate-slider');
        const boxOnes = document.getElementById('box-ones');
        const boxTenths = document.getElementById('box-tenths');
        const boxHundredths = document.getElementById('box-hundredths');

        function updateDisplayBoxes(valStr) {
            let padded = valStr.padStart(3, '0');
            if (padded.length > 3) padded = padded.slice(-3);

            boxOnes.textContent = padded[0];
            boxTenths.textContent = padded[1];
            boxHundredths.textContent = padded[2];

            return padded;
        }

        hiddenRate.addEventListener('input', function(e) {
            let val = e.target.value.replace(/[^0-9]/g, '');
            if (!val) val = '0';
            
            const processed = updateDisplayBoxes(val);
            e.target.value = processed;
            slider.value = parseInt(processed, 10);
        });

        slider.addEventListener('input', function(e) {
            const valStr = String(e.target.value);
            const processed = updateDisplayBoxes(valStr);
            hiddenRate.value = processed;
        });

        // --- ストップウォッチ & ラップのロジック ---
        let startTime;
        let elapsedTime = 0;
        let timerInterval;
        
        let lapCount = 0;
        let lastLapTime = 0;
        let currentConvertedTime = 0;

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            const centiseconds = Math.floor((ms % 1000) / 10);

            return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${String(centiseconds).padStart(2, '0')}`;
        }

        function updateTime() {
            const now = Date.now();
            const timePassed = now - startTime + elapsedTime;

            document.getElementById('normal-display').textContent = formatTime(timePassed);

            const rate = parseInt(hiddenRate.value, 10) / 100;
            currentConvertedTime = timePassed * rate;
            document.getElementById('display').textContent = formatTime(currentConvertedTime);
        }

        function startTimer() {
            if (!timerInterval) {
                startTime = Date.now();
                timerInterval = setInterval(updateTime, 10);
                
                const subBtn = document.getElementById('sub-btn');
                subBtn.textContent = "ラップ";
                subBtn.className = "lap-btn";
                subBtn.setAttribute("onclick", "pushLap()");
            }
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                elapsedTime += Date.now() - startTime;
                
                const subBtn = document.getElementById('sub-btn');
                subBtn.textContent = "リセット";
                subBtn.className = "reset-btn";
                subBtn.setAttribute("onclick", "resetTimer()");
            }
        }

        function pushLap() {
            lapCount++;
            
            const lapContainer = document.getElementById('lap-container');
            lapContainer.style.visibility = "visible";

            const splitTime = currentConvertedTime - lastLapTime;
            
            const lapList = document.getElementById('lap-list');
            const row = document.createElement('tr');
            
            row.innerHTML = `
                <td>ラップ ${lapCount}</td>
                <td>${formatTime(splitTime)}</td>
                <td>${formatTime(currentConvertedTime)}</td>
            `;
            
            lapList.insertBefore(row, lapList.firstChild);
            
            lastLapTime = currentConvertedTime;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            elapsedTime = 0;
            currentConvertedTime = 0;
            lastLapTime = 0;
            lapCount = 0;
            
            document.getElementById('normal-display').textContent = "00:00:00.00";
            document.getElementById('display').textContent = "00:00:00.00";
            
            document.getElementById('lap-list').innerHTML = "";
            document.getElementById('lap-container').style.visibility = "hidden";
            
            const subBtn = document.getElementById('sub-btn');
            subBtn.textContent = "リセット";
            subBtn.className = "reset-btn";
            subBtn.setAttribute("onclick", "resetTimer()");
        }
    </script>
</body>
</html>
